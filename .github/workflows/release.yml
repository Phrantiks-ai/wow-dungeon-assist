name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build addon zip
        run: |
          ADDON_DIR="WoW-Dungeon-Assist"
          TOC_FILE="WoW-Dungeon-Assist.toc"

          mkdir -p "build/${ADDON_DIR}"
          cp "${TOC_FILE}" "build/${ADDON_DIR}/"

          while IFS= read -r line; do
            line="${line%$'\r'}"

            if [[ -z "$line" || "$line" =~ ^# ]]; then
              continue
            fi

            if [[ -f "$line" ]]; then
              mkdir -p "build/${ADDON_DIR}/$(dirname "$line")"
              cp "$line" "build/${ADDON_DIR}/$line"
            fi
          done < "${TOC_FILE}"

          cd build
          zip -r -X "../WoW-Dungeon-Assist-${{ steps.version.outputs.version }}.zip" "${ADDON_DIR}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: WoW-Dungeon-Assist-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
