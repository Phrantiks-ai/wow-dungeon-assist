name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build addon zip
        run: |
          mkdir -p build/WoW-Dungeon-Assist

          rsync -av ./ build/WoW-Dungeon-Assist/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='build' \
            --exclude='.previews' \
            --exclude='.DS_Store'

          cd build
          zip -r "../WoW-Dungeon-Assist-${{ steps.version.outputs.version }}.zip" WoW-Dungeon-Assist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: WoW-Dungeon-Assist-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
